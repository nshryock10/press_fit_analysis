<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyzing Joint...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FAFC;
      color: #334155;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
      width: 100%;
    }
    .loading-card {
      background: #fff;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
    }

    /* Spinner */
    .spinner-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }
    .spinner {
      width: 64px;
      height: 64px;
      border: 4px solid #E2E8F0;
      border-top: 4px solid #2563EB;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Pulse ring behind spinner */
    .spinner-ring {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spinner-ring::before {
      content: '';
      position: absolute;
      width: 80px;
      height: 80px;
      border: 2px solid #DBEAFE;
      border-radius: 50%;
      animation: pulse-ring 2s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 0; }
    }

    .status-title {
      font-size: 24px;
      font-weight: 700;
      color: #1E293B;
      margin-bottom: 8px;
    }
    .joint-name {
      color: #2563EB;
    }
    .status-subtitle {
      font-size: 15px;
      color: #64748B;
      margin-bottom: 32px;
    }

    /* Progress steps */
    .steps {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 8px;
      font-size: 13px;
      color: #64748B;
      transition: all 0.5s ease;
    }
    .step.active {
      background: #EFF6FF;
      border-color: #2563EB;
      color: #1E293B;
    }
    .step.complete {
      background: #F0FDF4;
      border-color: #059669;
      color: #059669;
    }
    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #CBD5E1;
      flex-shrink: 0;
    }
    .step.active .step-dot {
      background: #2563EB;
      animation: dot-pulse 1.5s ease-in-out infinite;
    }
    .step.complete .step-dot {
      background: #059669;
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #94A3B8;
      margin-top: 16px;
    }

    @media (max-width: 640px) {
      .loading-card { padding: 40px 24px; }
      .steps { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loading-card">
      <div class="spinner-wrapper">
        <div class="spinner-ring">
          <div class="spinner"></div>
        </div>
      </div>

      <div class="status-title">
        Analyzing <span class="joint-name" id="jointName">$Test 4</span>
      </div>
      <div class="status-subtitle">
        Press-fit optimization in progress. This typically takes 30–60 seconds.
      </div>

      <div class="steps">
        <div class="step active" id="step1">
          <span class="step-dot"></span>
          Parsing inputs
        </div>
        <div class="step" id="step2">
          <span class="step-dot"></span>
          Baseline calculation
        </div>
        <div class="step" id="step3">
          <span class="step-dot"></span>
          Optimization analysis
        </div>
        <div class="step" id="step4">
          <span class="step-dot"></span>
          Building report
        </div>
      </div>
    </div>

    <div class="footer">
      Press-Fit Optimization Assistant &mdash; AI-Powered Design Review
    </div>
  </div>

  <script>
    // Simulated step progression for visual polish during the live demo.
    // In production, this would be driven by real workflow status updates.
    const steps = ['step1', 'step2', 'step3', 'step4'];
    const timings = [8000, 18000, 28000]; // ms after page load to advance

    timings.forEach((ms, i) => {
      setTimeout(() => {
        // Complete current step
        document.getElementById(steps[i]).classList.remove('active');
        document.getElementById(steps[i]).classList.add('complete');
        // Activate next step
        if (i + 1 < steps.length) {
          document.getElementById(steps[i + 1]).classList.add('active');
        }
      }, ms);
    });
  </script>
</body>
</html>
